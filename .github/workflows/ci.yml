name: Sync official collection
on:
  push:
    branches:
      - master
permissions:
  contents: read
  actions: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sync-collection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 16
      - name: Find last successful sync commit
        id: last-success
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'master',
              status: 'success',
              per_page: 100,
            });
            const previous = runs.find((run) => run.id !== context.runId);
            core.setOutput('sha', previous ? previous.head_sha : '');
      - run: npm ci --production
      - run: npm run sync -- official --changed-from "${{ steps.last-success.outputs.sha }}" --changed-to "${{ github.sha }}"
        env:
          ALGOUX_API_TOKEN: ${{ secrets.ALGOUX_API_TOKEN }}
